name: 🎙️ AI News Digest Podcast

on:
  workflow_dispatch:
    inputs:
      briefing_text:
        description: "Formatted newsletter digest from n8n"
        required: true
        type: string
      blog_urls:
        description: "Comma-separated blog URLs to add as sources"
        required: false
        type: string
        default: ""

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install notebooklm-py
        run: pip install notebooklm-py

      - name: Write briefing to file
        run: |
          cat > /tmp/briefing.txt << 'BRIEFING_EOF'
          ${{ github.event.inputs.briefing_text }}
          BRIEFING_EOF

      - name: Create notebook
        id: create
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          RESULT=$(notebooklm create "AI Digest - $(date +%Y-%m-%d)" --json)
          echo "notebook_id=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin)['notebook']['id'])")" >> $GITHUB_OUTPUT

      - name: Add newsletter source
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          notebooklm source add /tmp/briefing.txt \
            --notebook ${{ steps.create.outputs.notebook_id }} --json

      - name: Add blog sources
        if: ${{ github.event.inputs.blog_urls != '' }}
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          IFS=',' read -ra URLS <<< "${{ github.event.inputs.blog_urls }}"
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)
            if [ -n "$url" ]; then
              echo "Adding source: $url"
              notebooklm source add "$url" \
                --notebook ${{ steps.create.outputs.notebook_id }} --json || true
            fi
          done

      - name: Wait for sources to be ready
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          for i in $(seq 1 20); do
            STATUS=$(notebooklm source list --notebook ${{ steps.create.outputs.notebook_id }} --json \
              | python3 -c "import sys,json; sources=json.load(sys.stdin)['sources']; print(all(s['status']=='ready' for s in sources))")
            echo "Sources ready: $STATUS"
            if [ "$STATUS" = "True" ]; then break; fi
            sleep 15
          done

      - name: Generate podcast
        id: generate
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          RESULT=$(notebooklm generate audio \
            "Cover the most important AI and tech stories from today's sources. Connect related threads across different sources where relevant." \
            --notebook ${{ steps.create.outputs.notebook_id }} \
            --json)
          echo "task_id=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin)['task_id'])")" >> $GITHUB_OUTPUT

      - name: Wait for podcast to complete
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          notebooklm artifact wait ${{ steps.generate.outputs.task_id }} \
            --notebook ${{ steps.create.outputs.notebook_id }} \
            --timeout 1200

      - name: Download MP3
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          notebooklm download audio /tmp/morning-briefing.mp3 \
            --notebook ${{ steps.create.outputs.notebook_id }}

      - name: Send to Telegram
        run: |
          curl -s \
            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -F audio=@/tmp/morning-briefing.mp3 \
            -F caption="🎙️ AI digest ready — $(date +'%A, %B %d')" \
            https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendAudio

      - name: Cleanup notebook
        if: always()
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          notebooklm notebook delete ${{ steps.create.outputs.notebook_id }} || true
